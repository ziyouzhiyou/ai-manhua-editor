# MiMo API Specific Configuration
# Optimized for Xiaomi MiMo V2.5 models

mimo:
  api_key: "${MIMO_API_KEY}"
  base_url: "https://api.mimo.ai/v1"

  models:
    chat: "mimo-v2.5"
    reasoning: "mimo-v2.5-reasoning"
    multimodal: "mimo-v2.5-multimodal"
    image: "mimo-image-v2"
    tts: "mimo-tts-v1"

  generation:
    temperature: 0.7
    max_tokens: 4000
    top_p: 0.9

  image:
    size: "1024x1024"
    quality: "high"
    style: "anime"

  tts:
    voice: "zh-CN-XiaoxiaoNeural"
    speed: 1.0
    pitch: 1.0

  retry:
    max_retries: 3
    backoff_factor: 2
    timeout: 300
